# Access Transformer 配置
# 使 BossHealthOverlay.events 字段可公开访问，用于动态计算法力条 Y 偏移
# 避免法力条与整合包中其他模组的 BossBar 重叠
public net.minecraft.client.gui.components.BossHealthOverlay events
# 使 PostChain.passes 字段可公开访问，用于黑洞扭曲后处理着色器设置自定义 uniform
# PostChain.setUniform() 仅支持单值 float，多值 uniform（如 CenterPos）需直接访问 passes
public-f net.minecraft.client.renderer.PostChain passes
